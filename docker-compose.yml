version: '3.8'

services:

  flask-app:
    build: ./app
    container_name: flask-app
    restart: unless-stopped
    environment:
      - APP_VERSION=1.0.0
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      flask-app:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge