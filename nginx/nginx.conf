upstream flask_app {
    server flask-app:5000;
}

server {
    listen 80;

    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://flask_app/health;
        proxy_set_header Host $host;
    }
}